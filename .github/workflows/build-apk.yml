name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Python 3.10 (stable pour Kivy + p4a)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 2. Dépendances système MINIMALES (rapide)
    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y \
          python3.10 python3.10-distutils \
          openjdk-17-jdk \
          unzip zip git wget \
          autoconf automake libtool

        python3.10 -m ensurepip --upgrade
        python3.10 -m pip install --upgrade pip setuptools wheel

        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    # 3. NDK 25b (compatible p4a)
    - name: Install Android NDK 25b
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip
        sudo rm -rf /usr/local/lib/android/sdk/ndk
        sudo mkdir -p /usr/local/lib/android/sdk
        sudo mv android-ndk-r25b /usr/local/lib/android/sdk/ndk

    # 4. Buildozer + Cython
    - name: Install Buildozer
      run: |
        python3.10 -m pip install buildozer cython

    # 5. Build APK (rapide)
    - name: Build APK
      run: |
        python3.10 -m buildozer android debug

    # 6. Upload APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
